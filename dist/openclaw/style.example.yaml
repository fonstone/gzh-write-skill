# GzhWrite 风格配置
# 复制为 style.yaml 并修改为你的公众号信息
# 或让 GzhWrite 在首次使用时通过对话自动生成

name: "AI修炼营"
industry: "科技/互联网/AI "
target_audience: "25-40岁互联网从业者、科技爱好者"

# 内容方向
topics:
  - AI/人工智能
  - 产品设计
  - 创业/商业模式
  - 效率工具

# 写作风格
tone: "专业但不学术，有观点但不偏激，偶尔幽默"
voice: "第一人称，像一个懂行的朋友在分享见解"
word_count: "1500-2500"

# 内容风格（干货/故事/情绪/热点/测评）
# 影响选题偏好和框架推荐
content_style: "干货"

# 写作人格（决定文章语感和 AI 检测通过率）
# 可选：midnight-friend / industry-observer / sharp-journalist / warm-editor / cold-analyst / ai-cultivator
# 详见 personas/ 目录
writing_persona: "midnight-friend"

# 开头默认钩子类型（U=自动按人格；或手动指定）
# ai-cultivator 默认 problem_hook / sharp-journalist 默认 cold_open
# cold-analyst 默认 data_punch / industry-observer 默认 news_hook
# midnight-friend 默认 personal_moment / warm-editor 默认 scene
opening_hook: "U"

# 是否在结尾强制 CTA 三件套（紧迫感+低门槛+价值可视化）
# 默认 true。情感号午夜号可设 false 仅留金句
cta_strict: true

# 禁忌
blacklist:
  words: ["震惊", "必看", "不转不是中国人", "赶紧收藏"]
  topics: ["政治敏感", "宗教", "色情", "赌博"]

# 参考账号风格
reference_accounts:
  - "36氪"
  - "虎嗅"
  - "少数派"

# 排版
theme: "professional-clean"

# 封面
cover_style: "简洁科技感，蓝色调，扁平化设计"
# cover_template: ""  # 设置后跳过 AI 生成，直接使用该文件

# 署名
author: "Demo编辑部"
