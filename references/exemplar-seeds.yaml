# 通用人类写作模式种子
#
# 用途：没有范文库的用户，Step 4.4 用这些段落作为 few-shot 注入，
#       教 LLM "人类写作的结构模式长什么样"。
#
# 设计原则：
#   - 只示范结构模式（句长方差、情绪锐度、自我纠正、非总结式收尾）
#   - 不携带特定风格/人格（任何 persona 都能兼容）
#   - 每个段落标注了它示范的反AI模式
#
# 有用户自己的范文库时，这个文件不会被使用。

opening_hooks:
  - text: |
      好多年没有坐公交了，上次去太子湾，由于景区限行，只能把车停在外面，坐景区免费接驳车过去。
      前面座位看到一个小女孩一直在刷那种 AI 生成的短视频，画面非常粗糙，内容也很假，滑到下一个居然还是差不多的东西，看得津津有味。
      当时看到这一幕我甚至有点伤心。
    pattern: "日常观察切入 → 意外情绪反应。不总结、不预告、不铺垫。"

  - text: |
      **本硕八年毕业，单程通勤两个半小时，**月薪2690。 这是市场给我贴的标签。
      **裸辞。创业，年收超7位数。** 这是我自己撕掉那个标签之后，重新定义的自己。
      一路走来，中间发生了什么？我讲给你听。
    pattern: "标签→撕裂对比开头。两组加粗短句制造视觉和语义落差。句长标准差 45.7（数据最高）。"

  - text: |
      29号，我和小伙伴在深圳搞活动。
      活动结束之后，我想顺道拜访一个多年没见的老朋友，发消息过去。
      他回：在三亚。
      我问：度假？
      他说：带孩子。
      我盯着手机屏幕，愣了整整三秒。
    pattern: "对话碎片制造节奏。2-4字短句紧邻20+字长句。物理反应替代心理描写。"

  - text: |
      我信了这套话很多年。
      "要有长期主义。要相信复利。时间是最好的朋友。"
      最惨的一次，在一个方向扎进去3年，回头一看，什么都没留下来。
    pattern: "先认同再推翻。引用常见正确的话→用个人惨痛经历否定。开头即高潮。"

emotional_peaks:
  - text: |
      我信了这套话很多年。
      最惨的一次，在一个方向扎进去3年，回头一看，什么都没留下来。
      这不是失败——失败还有个明确的结果。
      是你信错了一件事。
    pattern: "用'最惨'而非'有挑战'。否定委婉说法（'这不是失败'），给出更痛的定义。"

  - text: |
      很多人在温水煮青蛙的过程中得过且过，过着看似满意、实则内心有很多不满的生活，然后说一句，算了吧，现在这样也还行，但这样反而错失了挖掘自己最大潜力的机会。
    pattern: "用'温水煮青蛙'具象化停滞感。'算了吧'是内心独白式引用。来自得分最低（32.8）的文章。"

  - text: |
      讲真，我每次看到这种争论，都觉得……怎么说呢……挺无语的。
      不是说这些人蠢。
      是他们在纠结一个根本不存在的问题。
      什么叫"AI味道"？你能定义吗？你能量化吗？你能验证吗？
      不能。
      那你在纠结什么？
    pattern: "填充词（'怎么说呢'）+ 连续反问不给答案 + 单字段落（'不能。'）。"

transitions:
  - text: |
      我第一反应是"孩子这时候不应该在学校吗"，第二反应是想把这话发过去，第三反应是我把那句话吞回去了——因为我在那三秒里想清楚了一件事。
    pattern: "思维过程外化（三个反应）。破折号打断 → 时间锚点（'三秒'）→ 悬念。"

  - text: |
      不过，到了之后我发现，什么作息啊，学习强度啊，都不是最难熬的，人才是。
    pattern: "列举预期困难再一句否定。转折词 + 真实困难揭示。"

  - text: |
      不过话又说回来。知道自己在局里，这件事本身，就已经是出局的开始了。
    pattern: "'不过话又说回来'——自我推翻后重新定位。制造思维的非线性感。"

closings:
  - text: |
      时间是你唯一不可再生的资源。
      把它投进一个真实存在的锚点，才叫复利。
      投进一个"我相信它会好"的希望，叫做漫长的等死。
    pattern: "重新定义核心概念收尾。'等死'替代励志结论。来自得分 36.7 的文章。"

  - text: |
      有了 AI 之后，很多事都更容易了，但也正因为更容易了，什么东西真的值得做、值得花很多年去换，反而变得更难想清楚。要做什么可能比怎么更快做出一个东西更加重要了。
    pattern: "结尾是未完成的思考，不是结论。'可能'留有余地。没有升华。"

  - text: |
      我苦哈哈的在电脑前，写这篇文章，想着我的女儿。
      差距是真实的。
      机会也是真实的。
      时钟在走，窗口在收窄。
    pattern: "回到写作现场。重复句式（'是真实的'）制造执念感。来自得分 33.0 的文章。"

  - text: |
      不要在那个愣住的感觉里待太久。
      那个感觉，待久了，就成了借口。
    pattern: "回扣开头意象。两句话收束，不解释。草率感本身就是风格。"

# 反翻译腔示范：这些段落展示中文原生表达——主语省略、短句并置、意合承转、
# 没有英文翻译的从句嵌套和被动语态。注入时提醒 LLM "注意何为主语省略和意合句法"。
#
# paired_examples 是"翻译腔原文 → 中文原生改写"的成对对照。
# 注入时要求 LLM 逐对阅读，理解每种翻译腔模式的改写方向，再润色己文。

anti_translation_paired_examples:
  - before: |
      一个被广泛认可的观点是，现代操作系统中的内存管理机制对于系统的整体性能和稳定性具有至关重要的影响，这一点在学术界和工业界都得到了充分的验证和广泛的讨论。
    after: |
      操作系统怎么管内存，直接决定了系统快不快、稳不稳——做系统和做应用的人都有共识。
    pattern: "去掉'一个被广泛认可的观点是'——直接说共识。从句嵌套('这一点在……都得到了……')拆成短句('快不快、稳不稳')。被动语态('得到了充分的验证')改成主动('做系统的人都有共识')。"

  - before: |
      在当前的AI技术发展阶段中，大语言模型的推理能力正在以前所未有的速度被持续提升，这为下游应用的落地提供了更多的可能性，可以被看作是人工智能领域的一个重要里程碑。
    after: |
      LLM 的推理能力正在快速提升——下游能做的东西越来越多了。
    pattern: "去掉'在……阶段中'的时间虚词开头。'以前所未有的速度被持续提升' → '快速提升'。'可以被看作是'被动 → 删掉整句。所有定语从句('这为……提供了……')删掉，只留核心因果。"

  - before: |
      当你第一次接触到这个概念的时候，你可能会有一种感觉，觉得它虽然看起来非常简单，但实际上它背后隐藏着非常深层次的原理和设计哲学，如果不经过深入的学习和思考，是很难真正理解和掌握的。
    after: |
      这个概念第一眼看很简单，背后藏的东西却很深。不花功夫学，很难真正搞懂。
    pattern: "'当你……的时候，你可能会有一种感觉' → 直接说'第一眼看……'。'如果不经过深入的学习和思考' → '不花功夫学'。从句嵌套拆成两个短句。隐藏掉英文的'you'主语('当你'→省略主语)。"

  - before: |
      需要注意的是，这个实验的结论并不能被简单地推广到所有的应用场景中去，因为它在设计之初就有着相当严格的前提假设条件，这些条件在现实世界的复杂环境中往往是难以被完全满足的。
    after: |
      但这个实验的结论不能随便套到所有场景——它的前提假设很严格，现实里很难完全满足。
    pattern: "'需要注意的是' → '但'，删掉宣告词。'被简单地推广到' → '不能随便套到'。'在设计之初就有着' → 直接说'它的前提假设'。被动('难以被满足') → 主动('很难满足')。"

  - before: |
      从更深的层次来看，这个问题本质上反映的是传统架构与现代需求之间的根本性矛盾，而解决这一矛盾的关键在于，是否能够跳出原有的思维框架，从一个全新的视角来重新审视问题的本质。
    after: |
      说白了，这是旧架构和新需求之间的矛盾。要解决，得跳出原来的框框，从头想清楚问题到底是什么。
    pattern: "'从更深的层次来看' → '说白了'。'本质上反映的是' → '是'。'是否能够跳出原有的思维框架，从一个全新的视角来重新审视' → '跳出原来的框框，从头想清楚'。删掉所有抽象名词堆砌。"

anti_translation_seeds:
  - text: |
      账上只剩七万。合伙人说要再撑三个月。
      三个月。
      撑过去了。也没撑过去——人是留下了，心散了。
    pattern: "主语全部省略。短句并置。意合承转——'撑过去了'和'也没撑过去'对立，无需'不过'连接。没有从句嵌套。"

  - text: |
      说到底是个信任问题。
      不是产品不行，不是价格太高。
      是你说了三次会修，没修。
    pattern: "反翻译腔典范：无主语短句并置，无'是因为'从句，无'可以被认为是'被动。直接说'是你说了三次会修，没修'。"

  - text: |
      去年硅谷回来一个朋友，在望京租了办公室，做了个 SaaS。
      今年我再问，办公室退了，回美国了。
      他说：这边获客成本是那边的三倍。
    pattern: "时间线叙事无主语充分化。'获客成本是那边的三倍'——直说，不用'与海外市场相比，获客成本显著偏高'那种翻译腔。"

# 不自标深度示范：这些段落展示了'直接写出深层内容，不加任何深度宣告'的模式。
# 没有'再深入一层'，没有'从更深的维度来看'。读者自己会感受到深度。
#
# paired_examples 是"宣告深度 → 直接写深"的成对对照。
# 注入时要求 LLM 逐对阅读，特别注意 after 段中删掉了哪些宣告词。

anti_depth_proclaim_paired_examples:
  - before: |
      再深入一层来看，这个现象的背后其实隐藏着一个更深层次的问题。它不仅仅是一个技术选择的问题，更是一个关于如何平衡短期收益和长期可持续发展的根本性思考。
    after: |
      这本质上是技术选择和长期发展的冲突——今天怎么选，决定了三年后是积累还是负债。
    pattern: "'再深入一层来看' → 直接删掉。'这个问题背后其实隐藏着一个更深层次的问题' → '本质上是'。'如何平衡短期收益和长期可持续发展的根本性思考'(12字抽象名词串) → '今天怎么选，决定了三年后'(7字具体场景)。不宣告深度，让读者自己感受到深度。"

  - before: |
      从底层原理的角度来分析，我们可以发现这个看似简单的工具实际上蕴含了非常深刻的设计哲学。它不只是一个效率工具，更是对人类工作方式的一种重新定义和深刻反思。
    after: |
      这个工具看起来只是省了点时间。但你仔细看——它改变的是你做事的方式，而不是把你做的事变快了。
    pattern: "'从底层原理的角度来分析' → 删掉。'我们可以发现这个看似简单的工具实际上蕴含了非常深刻的设计哲学' → '看起来只是省了点时间。但你仔细看——'。两层递进('看起来是X→实际上是Y')靠内容自然展开，不靠宣告词。"

  - before: |
      本文旨在深入探讨大语言模型在垂直领域落地时所面临的核心挑战与机遇。在接下来的章节中，我们将从技术、商业、组织三个维度分别展开论述，试图为读者提供一个全方位的认知框架。
    after: |
      大模型在垂直领域落地，技术不是最难的问题。最难的问题是：谁买单？谁运维？谁对结果负责？
    pattern: "'本文旨在深入探讨' → 删掉。'在接下来的章节中，我们将在技术、商业、组织三个维度分别展开论述，试图为读者提供一个全方位的认知框架' → '技术不是最难的问题。最难的问题是：'。不预告"我要讲什么"，直接抛出反直觉结论。三层递进靠三个连续反问实现。"

  - before: |
      关于这个问题，如果我们能够换一个全新的视角来看待，或许能够获得一些意想不到的启发和洞见。以下我将从三个不同维度来分析这个问题，希望能给大家带来一些新的思考。
    after: |
      换个角度看看这个问题。
    pattern: "'关于这个问题，如果我们能够换一个全新的视角来看待，或许能够获得一些意想不到的启发和洞见。以下我将从三个不同维度来分析这个问题，希望能给大家带来一些新的思考'(78字元评论) → '换个角度看看这个问题'(9字)。直接做，不宣告要做。"

anti_depth_proclaim_seeds:
  - text: |
      你以为问题是"怎么提高效率"。
      其实不是。
      问题是你在做一件不该做的事，然后在想怎么把它做得快一点。
    pattern: "直接揭示深层矛盾，不说'让我们深入探讨'。三层递进靠内容自然展开，不靠宣告。"

  - text: |
      真正危险的不是 AI 替代你。
      是你用 AI 照着原来的方式做，做出来跟没 AI 的时候一样，只是快了三倍。
      快了三倍地做一件没用的事，更没用。
    pattern: "直接抛出反直觉结论。没有'如果我们把视角拉远'或'从更深的维度来看'。三层递进靠推理链，不靠元评论。"

  - text: |
      工具能放大什么，取决于你手里有什么。
      如果你只有焦虑，AI 给你的是更高效的焦虑。
    pattern: "两层穿透：定义定律 + 反直觉应用。没有'更深地说'。读者自己会感到'原来不止这样'。"
