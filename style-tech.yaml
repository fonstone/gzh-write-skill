# Tech Popularization 风格配置
# 模式：技术科普（OS/AI/嵌入式）

name: "TechInfra"
content_type: "tech_popularization"

target_audience:
  - "入门开发者：需要前置知识标注与基础概念扫盲"
  - "进阶开发者：需要原理深度与实现细节"
  - "深度从业者：需要工程实践与经验数据"

topics:
  - "操作系统核心机制（进程调度/内存管理/文件系统）"
  - "AI/ML 原理与工程（模型架构/训练推理/部署优化）"
  - "嵌入式系统与 RTOS（中断/任务调度/内存布局）"
  - "编译原理与工具链（AST/IR/优化Pass/链接）"
  - "网络协议与分布式（TCP/IP/RPC/共识算法）"

tone: >
  严谨但不失清朗，像资深工程师给后辈做 Code Review——
  先确认对方知道什么，再讲新的，用类比降低门槛但不歪曲本质。

voice: >
  第三人称客观叙述为主，关键判断用第一人称复数"我们"，
  避免"我觉得""我认为"的主观断言。判断必有依据。

core_principles:
  - "准确性优先：所有技术结论、参数、代码必须可验证，禁止杜撰"
  - "分层递进：按读者认知水平从已知到未知，从概念到原理再到实践"
  - "通俗不歪曲：类比不能偏离技术本质，必须补充严谨定义"
  - "严谨不晦涩：术语首次出现必须释义，不做故弄玄虚的表述"
  - "实践导向：理论配套可运行的示例/代码/验证方法"
  - "吸引力与专业性平衡：标题可吸引人但不能标题党，内容必须匹配标题承诺；类比可通俗但不能歪曲技术本质，必须标注局限性"
  - "问题驱动：不要知识点堆砌，每个技术原理回答「为什么需要」「不用会怎样」「解决什么痛点」"
  - "共鸣增强：每个核心知识点配套1个开发者常见踩坑点，用真实体感替代抽象描述"

word_count: "2500-4000"
