name: "wired"
description: "WIRED Feature 风格：黑白对比强烈块状标题、青蓝高亮、深色引用块。专为科技观点/AI 前沿/产品发布视觉冲击型内容打造；深度技术细节类文章不推荐使用（视觉过强）。"
colors:
  primary: "#111111"
  secondary: "#00e5ff"
  text: "#111111"
  text_light: "#555555"
  background: "#ffffff"
  code_bg: "#111111"
  code_color: "#00e5ff"
  code_fn: "#f5ff00"
  accent_bg: "#f5ff00"
  quote_border: "#111111"
  quote_bg: "#111111"
  border_radius: "0px"
  darkmode:
    background: "#0a0a0a"
    text: "#e0e0e0"
    text_light: "#999999"
    primary: "#f5ff00"
    secondary: "#00e5ff"
    code_bg: "#1a1a1a"
    code_color: "#00e5ff"
    quote_bg: "#1a1a1a"
    quote_border: "#f5ff00"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.74;
    color: #111111;
    background: #ffffff;
    max-width: 750px;
    margin: 0 auto;
    padding: 22px;
    word-wrap: break-word;
  }
  h1 {
    font-size: 28px;
    font-weight: 950;
    color: #111111;
    margin: 36px 0 26px 0;
    padding: 16px 0;
    border-top: 6px solid #111111;
    border-bottom: 6px solid #111111;
    line-height: 1.16;
    text-align: left;
  }
  h2 {
    font-size: 20px;
    font-weight: 900;
    color: #111111;
    margin: 44px 0 14px 0;
    padding: 10px 12px;
    background: #f5ff00;
    line-height: 1.35;
  }
  h3 {
    font-size: 18px;
    font-weight: 900;
    color: #111111;
    margin: 32px 0 10px 0;
    line-height: 1.4;
    text-decoration: underline;
    text-decoration-thickness: 4px;
    text-decoration-color: #00e5ff;
    text-underline-offset: 5px;
  }
  h4 {
    font-size: 16px;
    font-weight: 850;
    color: #111111;
    margin: 22px 0 10px 0;
    line-height: 1.4;
  }
  p {
    font-size: 16px;
    line-height: 1.74;
    color: #111111;
    margin: 12px 0;
  }
  strong {
    font-weight: 950;
    color: #111111;
    background: #f5ff00;
    padding: 0 2px;
  }
  em {
    font-style: italic;
    color: #111111;
  }
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #111111;
    color: #00e5ff;
    padding: 2px 6px;
    border-radius: 0;
  }
  pre {
    background: #111111;
    color: #00e5ff;
    padding: 14px 16px;
    border-radius: 0;
    overflow-x: auto;
    margin: 18px 0;
    line-height: 1.6;
  }
  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 13.6px;
    background: none;
    color: #00e5ff;
    padding: 0;
    border-radius: 0;
  }
  blockquote {
    margin: 22px 0;
    padding: 15px 16px;
    background: #111111;
    color: #ffffff;
    border-left: 0;
    border-radius: 0;
    font-weight: 750;
  }
  blockquote p {
    margin: 8px 0;
    color: #ffffff;
  }
  ul {
    padding-left: 22px;
    margin: 12px 0;
    list-style-type: none;
  }
  ol {
    padding-left: 22px;
    margin: 12px 0;
    list-style-type: none;
  }
  li {
    font-size: 16px;
    line-height: 1.74;
    color: #111111;
    margin: 8px 0;
    padding: 8px 10px;
    background: #f2f2f2;
    border-left: 5px solid #111111;
    list-style-position: inside;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 15px;
  }
  thead {
    background: #111111;
  }
  th {
    background: #111111;
    color: #f5ff00;
    font-weight: 900;
    padding: 10px 14px;
    text-align: left;
    border: 2px solid #111111;
  }
  td {
    padding: 10px 14px;
    border: 2px solid #111111;
    color: #111111;
    background: #ffffff;
  }
  td:first-child {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 13.6px;
    color: #111111;
    font-weight: 800;
    background: #f5ff00;
    white-space: nowrap;
  }
  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 0;
  }
  a {
    color: #111111;
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-decoration-color: #00e5ff;
    font-weight: 700;
  }
  hr {
    border: none;
    height: 5px;
    background: #111111;
    margin: 34px 0;
  }