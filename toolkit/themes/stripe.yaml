name: "stripe"
description: "Stripe Docs 风格：冷静蓝紫强调色、白底、等宽代码块、有序步骤，适合教程/工具说明/产品文档/操作指南。技术信息优先，极少装饰干扰。"
colors:
  primary: "#635bff"
  secondary: "#3b35a8"
  text: "#2a2f45"
  text_light: "#425466"
  background: "#fbfcff"
  code_bg: "#eef2ff"
  code_color: "#3b35a8"
  code_fn: "#635bff"
  quote_border: "#635bff"
  quote_bg: "#ffffff"
  border_radius: "4px"
  darkmode:
    background: "#0e1030"
    text: "#c7cce8"
    text_light: "#8b93b8"
    primary: "#a78bfa"
    code_bg: "#1a1c44"
    code_color: "#c4b5fd"
    quote_bg: "#1a1c44"
    quote_border: "#635bff"
base_css: |
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 16px;
    line-height: 1.78;
    color: #2a2f45;
    background: #fbfcff;
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 22px;
    word-wrap: break-word;
  }
  h1 {
    font-size: 25px;
    font-weight: 850;
    color: #0a2540;
    margin: 36px 0 24px 0;
    line-height: 1.32;
    text-align: left;
  }
  h2 {
    font-size: 19px;
    font-weight: 820;
    color: #0a2540;
    margin: 42px 0 14px 0;
    padding: 10px 12px;
    background: #f1f5ff;
    border-left: 4px solid #635bff;
    line-height: 1.45;
  }
  h3 {
    font-size: 17px;
    font-weight: 780;
    color: #425466;
    margin: 30px 0 10px 0;
    line-height: 1.5;
  }
  h4 {
    font-size: 16px;
    font-weight: 760;
    color: #425466;
    margin: 22px 0 10px 0;
    line-height: 1.5;
  }
  p {
    font-size: 16px;
    line-height: 1.78;
    color: #2a2f45;
    margin: 12px 0;
  }
  strong {
    font-weight: 850;
    color: #0a2540;
  }
  em {
    font-style: italic;
    color: #2a2f45;
  }
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 14px;
    background: #eef2ff;
    color: #3b35a8;
    padding: 2px 6px;
    border-radius: 4px;
  }
  pre {
    background: #0a0e2a;
    color: #c7cce8;
    padding: 16px 18px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 18px 0;
    line-height: 1.65;
    border: 1px solid #1a1c44;
  }
  pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 13.6px;
    background: none;
    color: #c7cce8;
    padding: 0;
    border-radius: 0;
  }
  blockquote {
    border-left: 4px solid #635bff;
    background: #ffffff;
    border: 1px solid #d9e2f3;
    border-left: 4px solid #635bff;
    margin: 20px 0;
    padding: 14px 16px;
    border-radius: 0 6px 6px 0;
    color: #3c4257;
  }
  blockquote p {
    margin: 8px 0;
    color: #3c4257;
  }
  ul {
    padding-left: 24px;
    margin: 12px 0;
    list-style-type: disc;
  }
  ol {
    padding-left: 24px;
    margin: 12px 0;
  }
  li {
    font-size: 16px;
    line-height: 1.78;
    color: #2a2f45;
    margin: 8px 0;
    padding-left: 4px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 15px;
  }
  thead {
    background: #f1f5ff;
  }
  th {
    background: #f1f5ff;
    color: #0a2540;
    font-weight: 720;
    padding: 10px 14px;
    text-align: left;
    border: 1px solid #d9e2f3;
    border-bottom: 2px solid #635bff;
  }
  td {
    padding: 10px 14px;
    border: 1px solid #e5ebf5;
    color: #2a2f45;
  }
  td:first-child {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    font-size: 13.6px;
    color: #3b35a8;
    white-space: nowrap;
  }
  tr:nth-child(even) {
    background: #fafbff;
  }
  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 24px auto;
    border-radius: 6px;
  }
  a {
    color: #635bff;
    text-decoration: none;
    font-weight: 500;
  }
  hr {
    border: none;
    border-top: 1px solid #d9e2f3;
    margin: 32px 0;
  }